experiment_name: tau2-agent-service-rollout
trial_name: 1.7b-telecom

seed: 1
enable_offload: false
total_train_epochs: 1
total_train_steps: null
tokenizer_path: ${model_path}

model_path: Qwen/Qwen3-1.7B

cluster:
  n_nodes: 1
  n_gpus_per_node: 2
  fileroot: /path/to/experiments
  name_resolve:
    type: nfs
    nfs_record_root: /path/to/name_resolve

scheduler:
  type: local

gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 8192
  max_tokens: 16384
  greedy: false
  temperature: 1.0

rollout:
  _version: v2
  backend: "sglang:d2"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: 8
  max_head_offpolicyness: 1000000000
  enable_rollout_tracing: true
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: false
  admin_api_key: rollout-admin
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    engine_max_tokens: ${gconfig.max_tokens}
    export_style: individual
    turn_discount: 1.0
    admin_api_key: rollout-admin
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 2
      mem: 16
      cmd: python3 -m areal.experimental.inference_service.guard
      env_vars:
        AREAL_PROXY_WARN_ONCE: "1"

agent_service:
  agent_cls_path: examples.experimental.agent_service.tau2.agent.Tau2Agent
  admin_api_key: areal-agent-admin
  num_pairs: 1
  setup_timeout: 120.0
  health_poll_interval: 5.0
  drain_timeout: 30.0
  log_level: info
  env: {}

econfig:
  domain: telecom
  max_steps: 50
  add_thinking_tool: false
  solo_mode: false
  user_llm_base_url: http://localhost:8000/v1/
  user_llm: openai/self-hosted-Qwen2.5-72B
  user_llm_args:
    temperature: 0.0
    max_completion_tokens: 512
  turn_discount: 1.0
  invalid_format_penalty: 0.1

sglang:
  model_path: ${model_path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: bfloat16
  max_running_requests: null
  context_length: 32768
  mem_fraction_static: 0.8

train_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: tau2/train
  type: rl
  max_length: 1024

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
