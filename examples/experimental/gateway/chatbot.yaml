experiment_name: chatbot-gateway
trial_name: qwen3-1.7b

seed: 1
total_train_epochs: 1
tokenizer_path: Qwen/Qwen3-1.7B

cluster:
  n_nodes: 1
  n_gpus_per_node: 1
  fileroot: /tmp/areal/chatbot
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/areal/name_resolve

# Single GPU: 1 SGLang instance with TP=1
allocation_mode: sglang:d1p1t1

scheduler:
  type: local

# SGLang inference server configuration
sglang:
  model_path: ${tokenizer_path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: bfloat16
  context_length: 32768
  mem_fraction_static: 0.85
