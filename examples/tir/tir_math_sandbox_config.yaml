# Tool-Integrated Reasoning with Sandbox Execution
#
# This config is identical to tir_math_config.yaml except:
#   - enable_tools uses "sandbox_python" instead of "python"
#   - sandbox section is enabled with E2B backend
#
# Usage:
#   # Option 1: Set credentials via environment variables (recommended)
#   export SANDBOX_API_URL=https://your-e2b-endpoint
#   export SANDBOX_API_KEY=your-key
#   python3 examples/tir/train_tir.py \
#     --config examples/tir/tir_math_sandbox_config.yaml
#
#   # Option 2: Pass credentials via CLI overrides
#   python3 examples/tir/train_tir.py \
#     --config examples/tir/tir_math_sandbox_config.yaml \
#     tir.sandbox.api_url=https://your-e2b-endpoint \
#     tir.sandbox.api_key=your-key

experiment_name: tir-math-sandbox
trial_name: tir-math-sandbox
cluster:
  fileroot: /tmp/areal/experiments
  n_nodes: 1
  n_gpus_per_node: 8
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/areal/name_resolve
seed: 1
enable_offload: false
total_train_epochs: 3
tokenizer_path: ${actor.path}

scheduler:
  type: local

rollout:
  backend: "sglang:d4p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 128
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 512
  greedy: false
  temperature: 1.0

actor:
  backend: "fsdp:d4p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen2.5-Math-1.5B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer:
    type: adam
    lr: 1.70e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  rejection_sampling:
    metric: ratio
    upper: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang configuration
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  allow_auto_truncate: true
  max_running_requests: null
  context_length: 4096
  mem_fraction_static: 0.8

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 32768
  gpu_memory_utilization: 0.9

# Tool-Integrated Reasoning configuration (with sandbox)
tir:
  max_turns: 2
  max_length: 3000
  tool_timeout: 30
  enable_tools: sandbox_python;calculator
  sandbox:
    enabled: true
    backend: e2b
    api_url: ""              # or set SANDBOX_API_URL env var
    api_key: ""              # or set SANDBOX_API_KEY env var
    template_id: ""          # pre-configured sandbox template (optional)
    ssl_cert_file: ""        # CA cert for self-hosted deployments (optional)
    timeout: 30.0

# Dataset configuration
train_dataset:
  batch_size: 32
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /tmp/areal/torl_data/train.parquet
  type: rl
  max_length: 500

valid_dataset:
  batch_size: 32
  shuffle: false
  pin_memory: true
  num_workers: 4
  path: /tmp/areal/torl_data/test.parquet
  type: rl
  max_length: 500

# Tool configuration
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
