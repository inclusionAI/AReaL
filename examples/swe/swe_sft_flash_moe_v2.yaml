experiment_name: swe-sft
trial_name: flash-moe-v2

seed: 1
enable_offload: false
total_train_epochs: 7
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 4
  n_gpus_per_node: 8
  fileroot: /tmp/experiments
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/name_resolve

# 8 nodes x 8 GPUs = 64 GPUs
# Bailing Flash (BailingMoeV2_5): 32 layers, H=4096, 256 experts, 32 heads
# PP=4 to reduce per-rank model params (~7.5B -> ~3.75B) and fix OOM during optimizer step
# Attention: DP=2, PP=4, TP=2, CP=4 -> world = 2*4*2*4 = 64
# FFN:       DP=2, PP=4, EP=8        -> world = 2*4*8   = 64
# heads_per_tp = 32/2 = 16, 16 % CP(4) = 0 ✓
# layers/PP = 32/4 = 8 ✓
# 256 experts % EP(8) = 0 ✓
allocation_mode: "megatron:(attn:d2p4t2c4|ffn:d2p4e8)"

scheduler:
  type: slurm

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /storage/openpsi/models/Ling2.5/swe_ring25_flash_tokenizer
  init_from_scratch: false
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: bfloat16
  mb_spec:
    n_mbs: 8
    granularity: 1
    max_tokens_per_mb: 32768
    n_mbs_divisor: 1
  optimizer:
    type: adam
    lr: 5e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 0.00001
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.0
    min_loss_scale: 1.0
    loss_scale_window: 5.0
    hysteresis: 2
  megatron:
    wrap_with_ddp: true
    ddp:
      # v2 change: fp32 grad reduce for accurate grad_norm (was false)
      grad_reduce_in_fp32: true
      # v2 change: overlap for performance (was false)
      overlap_grad_reduce: true
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 32
      image: /storage/openpsi/images/areal-dev.sif
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        NCCL_ASYNC_ERROR_HANDLING: "1"
        PYTHONPATH: "/storage/openpsi/users/chucai.dzq/codes/flash-linear-attention"
      additional_bash_cmds:
        - export UV_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ && uv pip install -e .

# SWE-specific data processing
swe:
  filter_errors: true
  strip_all_thinking: false
  pre_split: false
  num_proc: 1

train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  drop_last: true
  path: /path/to/swe_trajectories.jsonl
  type: sft
  max_length: 32768

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1

# v2: recovery enabled, skip optimizer save (flattened_range incompatible with dist optimizer)
recover:
  mode: auto
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_steps: 157
  freq_secs: 1800
  no_save_optim: true
  no_load_optim: true

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
