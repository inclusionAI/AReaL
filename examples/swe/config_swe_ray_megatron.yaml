experiment_name: swe-grpo-30b
trial_name: trial0-ray

seed: 1
enable_offload: false
total_train_epochs: 10
total_train_steps: 1024
tokenizer_path: ${actor.path}

post_exit_hook: "cd /storage/openpsi/zhengyu.hzy/code/swe/SWEAgent_train && PYTHONPATH=$PWD:$PYTHONPATH pip install -q -r requirements.txt && AENV_SYSTEM_URL=http://33.182.43.81:8080 python src/swe/clean_instances.py"

cluster:
  n_nodes: 4
  n_gpus_per_node: 8
  fileroot: /storage/openpsi/experiments
  name_resolve:
    type: ray
    ray_actor_name: ray_kv_store

allocation_mode: sglang:d4t4+megatron:(attn:d2p4t2|ffn:d1p4e4)

scheduler:
  type: ray

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 32768 # TODO
  max_tokens: 131071
  greedy: false
  temperature: 1.0
  top_p: 1.0
  top_k: 100000000

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 128
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: true
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 300.0
  request_timeout: 3600.0
  request_retries: 3
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    chat_template_type: hf
    engine_max_tokens: ${gconfig.max_tokens}
    export_style: individual
    turn_discount: 1.0
    session_timeout_seconds: 3600

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  # TODO: Update to your model path
  path: Qwen/Qwen3-30B-A3B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 32768 # per-mb forward token limit, avoid OOM for 30B MoE
    n_mbs_divisor: 1
  optimizer:
    type: adam
    lr: 5.0e-6
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  reward_clip: 20.0
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  discount: 1.0
  gae_lambda: 1.0
  adv_norm:
    mean_level: batch
    std_level: batch
    std_unbiased: true
    eps: 1.0e-05
  max_new_tokens: ${gconfig.max_new_tokens}
  enable_tree_training: false
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        AREAL_PROXY_WARN_ONCE: "1"
        # TODO: Update to your AEnv service URL
        AENV_SYSTEM_URL: "http://your-aenv-service:8080"
        # TODO: Update to your SWEAgent root path
        SWE_AGENT_ROOT: /path/to/SWEAgent
        WANDB_BASE_URL: your-wandb-url  # Optional: for W&B logging
        WANDB_API_KEY: your-wandb-api-key  # Optional: for W&B logging

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 32768 # match actor, avoid OOM for 30B MoE
    n_mbs_divisor: 1
  optimizer: null
  enable_tree_training: false

# SWE environment
econfig:
  dataset_path: ""
  swe_agent_config: rl_eval
  swe_agent_root: ""
  step_limit: 1000
  max_completion_tokens: 131072
  timeout: 3600.0

# SGLang inference server
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 131072
  max_prefill_tokens: 32768 # limit per-batch prefill to avoid OOM spikes
  mem_fraction_static: 0.8
  schedule_policy: lpm
  attention_backend: fa3
  log_level: warning

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 131072
  gpu_memory_utilization: 0.9

# Datasets
# TODO: Update to your SWE-bench dataset paths
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /path/to/swe_bench_verified.jsonl
  type: rl
  max_length: 32768
  drop_last: true

valid_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /path/to/swe_bench_verified.jsonl
  type: rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  enabled: false
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  save_interval: 1
  session_tracer:
    enabled: true
    flush_threshold: 100
