experiment_name: swe-rl
trial_name: trial1-30b-ray-concat

seed: 1
enable_offload: false
total_train_epochs: 200
total_train_steps: 12
tokenizer_path: /storage/openpsi/models/Qwen3-30B-A3B-Instruct-2507

# Post-exit cleanup command (e.g., release SWE sandbox instances)
# TODO: Update to your cleanup script path
post_exit_hook: "cd /storage/openpsi/zhengyu.hzy/code/swe/SWEAgent_train && PYTHONPATH=$PWD:$PYTHONPATH pip install -q -r requirements.txt && AENV_SYSTEM_URL=http://33.182.43.81:8080 python src/swe/clean_instances.py"
# Example:
# post_exit_hook: "cd /path/to/SWEAgent && PYTHONPATH=$PWD:$PYTHONPATH AENV_SYSTEM_URL=http://your-aenv:8080 python src/swe/clean_instances.py"

cluster:
  n_nodes: 8
  n_gpus_per_node: 8
  fileroot: /storage/openpsi/experiments
  name_resolve:
    type: ray
    ray_actor_name: ray_kv_store

# Parallel strategy (64 GPUs, 8 nodes):
#   SGLang inference: 32 GPUs = 8 instances x TP4
#   Megatron training: 32 GPUs = attn:dp1,pp4,tp2,cp4 | ffn:dp1,pp4,ep8
#   CP=4 splits 131072-token sequences across 4 GPUs, quartering logits memory
#   (logits: 32768×151936×2B = 9.3 GiB vs 18.6 GiB with CP=2)
#   CP applies to entire model (incl. FFN); EP=8 so FFN world_size matches
allocation_mode: sglang:d8t4+megatron:(attn:d1p4t2c4|ffn:d1p4e8)

scheduler:
  type: ray

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 8192
  max_tokens: 131072
  greedy: false
  temperature: 1.0

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: true
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    engine_max_tokens: ${gconfig.max_tokens}
    chat_template_type: concat
    export_style: concat
    turn_discount: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  # TODO: Update to your model path (Megatron loads from HF safetensors)
  path: /storage/openpsi/models/Qwen3-30B-A3B-Instruct-2507
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 131072
    n_mbs: 1
    granularity: 1
    n_mbs_divisor: 1
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  optimizer:
    type: adam
    lr: 5.0e-6
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  reward_norm: null
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  pad_to_maximum: false
  enable_tree_training: false
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 16
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        AREAL_PROXY_WARN_ONCE: "1"
        AENV_SYSTEM_URL: "http://33.182.43.81:8080"
        SWE_AGENT_ROOT: /storage/openpsi/zhengyu.hzy/code/swe/SWEAgent_train
        PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 131072
    n_mbs: 1
    granularity: 1
    n_mbs_divisor: 1
  optimizer: null
  enable_tree_training: false

# SWE environment
econfig:
  dataset_path: ""
  swe_agent_config: eval_v2_reflection_v1
  swe_agent_root: /storage/openpsi/zhengyu.hzy/code/swe/SWEAgent_train
  step_limit: 200
  max_completion_tokens: 131072
  timeout: 3600.0

# SGLang inference server
sglang:
  model_path: /storage/openpsi/models/Qwen3-30B-A3B-Instruct-2507
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 131072
  mem_fraction_static: 0.70
  disable_custom_all_reduce: true

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 131072
  gpu_memory_utilization: 0.9

# Datasets
# TODO: Update to your SWE-bench dataset paths
train_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /storage/openpsi/zhengyu.hzy/data/swe/trainable/swe_20251211_20157samples_join_annotation_f2p_15780_solvable_Python.jsonl
  type: rl
  max_length: 32768

valid_dataset:
  batch_size: 8
  shuffle: false
  pin_memory: true
  num_workers: 4
  path: /storage/openpsi/zhengyu.hzy/data/swe/trainable/swe_20251211_20157samples_join_annotation_f2p_15780_solvable_Python.jsonl
  type: rl
  drop_last: false

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  enabled: false
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  save_interval: 1
  session_tracer:
    enabled: false
    flush_threshold: 100
