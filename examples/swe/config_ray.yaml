experiment_name: swe-rl
trial_name: 32b-sft-ray

seed: 1
enable_offload: false
total_train_epochs: 200
total_train_steps: 12
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 4
  n_gpus_per_node: 8
  fileroot: /storage/openpsi/experiments
  name_resolve:
    type: ray
    ray_actor_name: ray_kv_store

# Parallel strategy (32 GPUs total):
#   SGLang inference: 16 GPUs = 4 instances x TP4
#   FSDP training:    16 GPUs = dp2 x cp8
allocation_mode: sglang:d4t4+fsdp:d2c8

scheduler:
  type: ray

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 8192
  max_tokens: 131071
  greedy: false
  temperature: 1.0

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    engine_max_tokens: ${gconfig.max_tokens}
    export_style: individual
    turn_discount: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  # TODO: Update to your model path
  path: /path/to/your/model
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 131072
  optimizer:
    type: adam
    lr: 5.0e-6
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  reward_norm: null
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  pad_to_maximum: true
  enable_tree_training: false
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 16
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        AREAL_PROXY_WARN_ONCE: "1"
        # TODO: Update to your AEnv service URL
        AENV_SYSTEM_URL: "http://your-aenv-service:8080"
        # TODO: Update to your SWEAgent root path
        SWE_AGENT_ROOT: /path/to/SWEAgent

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 131072
  optimizer: null

# SWE environment
econfig:
  dataset_path: ""
  swe_agent_config: rl_eval
  swe_agent_root: ""
  step_limit: 1000
  max_completion_tokens: 131072
  timeout: 3600.0

# SGLang inference server
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 131072
  mem_fraction_static: 0.70

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 131072
  gpu_memory_utilization: 0.9

# Datasets
# TODO: Update to your SWE-bench dataset paths
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /path/to/swe_bench_verified.jsonl
  type: rl
  max_length: 32768

valid_dataset:
  batch_size: 8
  shuffle: false
  pin_memory: true
  num_workers: 4
  path: /path/to/swe_bench_verified.jsonl
  type: rl
  drop_last: false

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  enabled: false
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  save_interval: 1
  session_tracer:
    enabled: false
    flush_threshold: 100
