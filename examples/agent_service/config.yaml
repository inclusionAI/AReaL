# Agent Service Demo Configuration

# Admin key for inter-service authentication (Router, Gateway, Worker).
# Change from default for non-local deployments.
admin_key: areal-agent-admin

# tau2 environment settings
tau2:
  domain: airline          # airline | retail | telecom
  data_dir: None           # path to tau2 data dir (or set TAU2_DATA_DIR env var)
  add_thinking_tool: false

# Agent LLM — the model the agent uses for reasoning + tool calls.
# For the demo this points to a local/self-hosted model.
agent_llm:
  model: openai:Ling-2.6-1T        # PydanticAI model string
  base_url: None               # e.g. http://localhost:8000/v1
  api_key: None

# User simulator LLM — drives the simulated customer.
# Set to null to use scripted user messages instead.
user_llm:
  model: openai:GLM-5                  # e.g. openai:Qwen2.5-72B
  base_url: None               # e.g. http://localhost:8001/v1
  api_key: None
