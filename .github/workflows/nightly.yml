name: Nightly CI

on:
  schedule:
    # 00:00 Beijing time (UTC+8) = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to checkout (default: main)'
        required: false
        type: string
        default: 'main'

concurrency:
  group: nightly-ci
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  INSTANCE_NAME: areal-nightly
  INSTANCE_ZONE: asia-southeast1-c

jobs:
  guard:
    name: Check trigger permissions
    runs-on: ubuntu-latest
    steps:
      - name: Block non-admin manual triggers
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: { permission } } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (permission !== 'admin') {
              core.setFailed(`User ${context.actor} has '${permission}' permission; admin required for manual dispatch.`);
            }

  start-runner:
    name: Start areal-nightly instance
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      was_running: ${{ steps.start-instance.outputs.was_running }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Start instance if stopped
        id: start-instance
        run: |
          set -euo pipefail

          status=$(gcloud compute instances describe "$INSTANCE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$INSTANCE_ZONE" \
            --format="get(status)" || echo "NOT_FOUND")

          if [ "$status" = "NOT_FOUND" ]; then
            echo "Error: Instance $INSTANCE_NAME not found in zone $INSTANCE_ZONE" >&2
            exit 1
          fi

          if [ "$status" = "RUNNING" ]; then
            echo "Instance $INSTANCE_NAME is already running."
            echo "was_running=true" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "TERMINATED" ] || [ "$status" = "SUSPENDED" ]; then
            echo "Instance $INSTANCE_NAME is $status. Starting it..."
            gcloud compute instances start "$INSTANCE_NAME" \
              --project "$GCP_PROJECT_ID" \
              --zone "$INSTANCE_ZONE"
            echo "Instance started successfully."
            echo "was_running=false" >> "$GITHUB_OUTPUT"
          else
            echo "Instance $INSTANCE_NAME has unexpected status: $status" >&2
            exit 1
          fi

      - name: Wait for runner to come online
        uses: actions/github-script@v8
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const instanceName = process.env.INSTANCE_NAME || 'areal-nightly';
            const maxAttempts = 60;
            const delayMs = 15000;

            const pat = process.env.GH_PAT;
            if (!pat) {
              core.setFailed('GH_PAT secret is not configured.');
              return;
            }

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const response = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                request: {
                  headers: {
                    authorization: `token ${pat}`,
                  },
                },
              });

              const found = response.data.runners.find((runner) => runner.name === instanceName);
              if (found && found.status === 'online') {
                core.info(`Runner ${instanceName} is online.`);
                return;
              }

              core.info(`Runner ${instanceName} not ready yet (attempt ${attempt}/${maxAttempts}).`);
              await wait(delayMs);
            }

            throw new Error(`Timed out waiting for runner ${instanceName} to come online.`);

  nightly-tests:
    name: Run nightly tests
    needs: start-runner
    environment: nightly
    runs-on:
      - self-hosted
      - areal-nightly
    timeout-minutes: 480
    env:
      IMAGE_REPO: ghcr.io/inclusionai/areal-runtime
    steps:
      - name: Clean workspace
        run: sudo rm -rf "${{ github.workspace }}"/* 2>/dev/null || true

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u inclusionai --password-stdin

      - name: Pull latest runtime images
        run: |
          docker pull "$IMAGE_REPO:dev-sglang"
          docker pull "$IMAGE_REPO:dev-vllm"

      - name: Determine run parameters
        id: params
        run: |
          BACKENDS=("fsdp" "megatron" "archon")
          BACKEND_SHORT=("f" "m" "a")
          DAY_OF_YEAR=$(date -u +%j)
          BACKEND_INDEX=$(( (10#$DAY_OF_YEAR - 1) % 3 ))
          echo "experiment_name=nightly-gsm8k-$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "trial_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "train_backend=${BACKENDS[$BACKEND_INDEX]}" >> "$GITHUB_OUTPUT"
          echo "train_backend_short=${BACKEND_SHORT[$BACKEND_INDEX]}" >> "$GITHUB_OUTPUT"

      - name: Run training (sglang + vllm)
        env:
          EXPERIMENT_NAME: ${{ steps.params.outputs.experiment_name }}
          TRIAL_DATE: ${{ steps.params.outputs.trial_date }}
          TRAIN_BACKEND: ${{ steps.params.outputs.train_backend }}
          TRAIN_BACKEND_SHORT: ${{ steps.params.outputs.train_backend_short }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
          MODEL_NAME: Qwen/Qwen3-0.6B
        run: |
          MODEL_CACHE=/opt/hf_cache

          declare -A VARIANT_SHORT=( [sglang]=s [vllm]=v )

          run_variant() {
            local variant=$1
            local trial_name="${TRAIN_BACKEND_SHORT}.${VARIANT_SHORT[$variant]}-${TRIAL_DATE}"
            echo "=== Running variant: $variant (trial: $trial_name) ==="
            docker run --rm \
              --runtime=nvidia --gpus all \
              --net=host \
              --shm-size=500g \
              --ulimit nofile=1048576:1048576 \
              --cap-add=SYS_ADMIN \
              --device=/dev/fuse \
              --security-opt=apparmor:unconfined \
              -e HF_TOKEN="$HF_TOKEN" \
              -e HF_HOME=/model_cache \
              -e WANDB_API_KEY="$WANDB_API_KEY" \
              -e TOKENIZERS_PARALLELISM=false \
              -v "$WORKSPACE:/workspace" \
              -v "$MODEL_CACHE:/model_cache" \
              -w /workspace \
              "$IMAGE_REPO:dev-$variant" \
              bash -lc '
                export PATH=/opt/.venv/bin:$PATH
                huggingface-cli download '"$MODEL_NAME"'
                uv pip install -e . --no-deps
                python3 examples/math/gsm8k_rl.py --config examples/math/gsm8k_grpo.yaml \
                  experiment_name='"$EXPERIMENT_NAME"' trial_name='"$trial_name"' \
                  stats_logger.wandb.mode=online \
                  rollout.backend='"$variant"':d1 actor.backend='"$TRAIN_BACKEND"':d1 \
                  cluster.n_nodes=1 cluster.n_gpus_per_node=2 \
                  actor.path='"$MODEL_NAME"' \
                  scheduler.type=local train_dataset.batch_size=64
              '
            sudo find "$WORKSPACE" -not -user "$(id -u)" -delete 2>/dev/null || true
          }

          run_variant sglang
          run_variant vllm

      - name: Cleanup
        if: always()
        run: |
          docker logout ghcr.io 2>/dev/null || true
          sudo find "${{ github.workspace }}" -not -user "$(id -u)" -delete 2>/dev/null || true

  stop-runner:
    name: Stop areal-nightly instance
    needs:
      - start-runner
      - nightly-tests
    if: always() && needs.start-runner.outputs.was_running != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Stop instance
        run: |
          set -euo pipefail

          status=$(gcloud compute instances describe "$INSTANCE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --zone "$INSTANCE_ZONE" \
            --format="get(status)" 2>/dev/null || echo "NOT_FOUND")

          if [ "$status" = "NOT_FOUND" ]; then
            echo "Warning: Instance $INSTANCE_NAME not found."
            exit 0
          fi

          if [ "$status" = "RUNNING" ]; then
            echo "Stopping instance $INSTANCE_NAME..."
            gcloud compute instances stop "$INSTANCE_NAME" \
              --project "$GCP_PROJECT_ID" \
              --zone "$INSTANCE_ZONE"
            echo "Instance stopped successfully."
          else
            echo "Instance $INSTANCE_NAME is already in status: $status"
          fi
