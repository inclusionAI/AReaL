# Test config: EAGLE speculative decoding + MTP online training
# Used by tests/speculative_decoding/test_speculative_decoding.py

experiment_name: test-spec-decode-mtp
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 1
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 1
  n_gpus_per_node: 2
  fileroot: /tmp/areal/test_spec_mtp
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/areal/test_spec_mtp/name_resolve

scheduler:
  type: null

rollout:
  backend: "sglang:d1p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 16
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: false

gconfig:
  n_samples: 2
  min_new_tokens: 0
  max_new_tokens: 128
  greedy: false
  temperature: 1.0

actor:
  backend: "megatron:d1p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-0.6B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: false
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer:
    type: adam
    lr: 1e-5
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.0
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  max_new_tokens: ${gconfig.max_new_tokens}

  # MTP Online Training ENABLED
  enable_mtp_training: true
  mtp_num_layers: 1
  mtp_loss_scaling_factor: 0.1

  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 16
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

  megatron:
    mtp_num_layers: 1
    mtp_loss_scaling_factor: 0.1

ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang with EAGLE + MTP training
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  context_length: 4096
  mem_fraction_static: 0.80

  speculative_algorithm: "EAGLE"
  speculative_draft_model_path: null
  speculative_num_steps: 3
  speculative_eagle_topk: 1
  speculative_num_draft_tokens: 4
  enable_draft_weights_cpu_backup: true

train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl
  max_length: 256

valid_dataset:
  batch_size: 16
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
