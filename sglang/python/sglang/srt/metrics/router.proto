syntax = "proto3";

package router;

service RouterManagement {
  rpc AddBackend(AddBackendRequest) returns (AddBackendResponse);
  rpc DeleteBackend(DeleteBackendRequest) returns (DeleteBackendResponse);
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse);
  rpc PushStats(PushStatsRequest) returns (PushStatsResponse);
}

message AddBackendRequest {
  string address = 1;
}

message AddBackendResponse {
  bool success = 1;
  string message = 2;
}

message DeleteBackendRequest {
  string address = 1;
}

message DeleteBackendResponse {
  bool success = 1;
  string message = 2;
}

message ListBackendsRequest {
}

message ListBackendsResponse {
  repeated string backends = 1;
}

message PrefillCompletionStatsProto {
  string request_id = 1;
  float prefill_latency_ms = 2;
  float ttft_ms = 3;
  int32 prompt_tokens = 4;
  int32 cached_tokens = 5;
  float queue_time_ms = 6;
  int32 priority = 7;
  int32 batch_size = 8;
}

message PushStatsRequest {
  string server_host = 1;
  int32 server_port = 2;
  int64 timestamp = 3;
  string stats_type = 4;

  SchedulerStatsProto scheduler_stats = 5;
  TokenizerStatsProto tokenizer_stats = 6;
  CacheStatsProto cache_stats = 7;
  StorageStatsProto storage_stats = 8;
  repeated PrefillCompletionStatsProto prefill_completion_stats = 9;
}

message PushStatsResponse {
  bool success = 1;
  string message = 2;
}

message SchedulerStatsProto {
  int32 num_running_reqs = 1;
  int32 num_used_tokens = 2;
  float token_usage = 3;
  float pending_prealloc_token_usage = 4;
  float swa_token_usage = 5;
  float mamba_usage = 6;
  float gen_throughput = 7;
  int32 num_queue_reqs = 8;
  int32 num_grammar_queue_reqs = 9;
  int32 num_running_reqs_offline_batch = 10;
  float cache_hit_rate = 11;

  float spec_accept_length = 12;
  float spec_accept_rate = 13;

  int32 num_retracted_reqs = 14;
  int32 num_paused_reqs = 15;

  int32 num_prefill_prealloc_queue_reqs = 16;
  int32 num_prefill_inflight_queue_reqs = 17;
  int32 num_decode_prealloc_queue_reqs = 18;
  int32 num_decode_transfer_queue_reqs = 19;
  float kv_transfer_speed_gb_s = 20;
  float kv_transfer_latency_ms = 21;
  float kv_transfer_bootstrap_ms = 22;
  float kv_transfer_alloc_ms = 23;

  float utilization = 24;
  int32 max_running_requests_under_SLO = 25;

  float engine_startup_time = 26;
  float engine_load_weights_time = 27;
  float new_token_ratio = 28;

  float is_cuda_graph = 29;
}

message TokenizerStatsProto {
  int64 prompt_tokens = 1;
  int64 generation_tokens = 2;
  int64 cached_tokens = 3;
  int64 num_requests = 4;
  int64 num_aborted_requests = 5;
  float avg_ttft = 6;
  float avg_itl = 7;
  float avg_e2e_latency = 8;
}

message CacheStatsProto {
  int64 evicted_tokens = 1;
  int64 loaded_back_tokens = 2;
  float avg_eviction_duration = 3;
  float avg_load_back_duration = 4;
}

message StorageStatsProto {
  repeated int32 prefetch_pgs = 1;
  repeated int32 backup_pgs = 2;
  repeated float prefetch_bandwidth = 3;
  repeated float backup_bandwidth = 4;
}
